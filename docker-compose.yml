services:
  app:
    build: .
    working_dir: /var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "8000:8000"
    volumes:
      - ".:/var/www/html"
    networks:
      - plataforma-medaula
    depends_on:
      - mysql

  mysql:
    image: 'mysql:8.0'
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: 'root'
      MYSQL_DATABASE: 'nfse'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - 'db-data:/var/lib/mysql'
    networks:
      - plataforma-medaula

networks:
  plataforma-medaula:
    driver: bridge

volumes:
  db-data:
    driver: local
